<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intrix - 준비 중입니다 | 감정 분석 기반 마케팅 전략 설계 시스템</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --primary: #2563EB;
            --primary-dark: #1E40AF;
            --primary-light: #DBEAFE;
            --secondary: #10B981;
            --accent: #F59E0B;
            --dark: #111827;
            --light: #F9FAFB;
            --gray: #9CA3AF;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            color: var(--dark);
            background-color: #F3F4F6;
            min-height: 100vh;
        }
        
        .hero-gradient {
            background: linear-gradient(135deg, #2563EB, #1E3A8A);
        }
        
        .btn-primary {
            background-color: var(--primary);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        
        .btn-primary:hover {
            background-color: var(--primary-dark);
        }
        
        .btn-outline {
            background-color: white;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        
        .btn-outline:hover {
            background-color: var(--primary-light);
        }

        /* Animation for the progress bar */
        @keyframes progress {
            0% { width: 0%; }
            100% { width: 80%; }
        }
        
        .progress-bar {
            background-color: rgba(255, 255, 255, 0.2);
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
            position: relative;
        }
        
        .progress-value {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background-color: white;
            border-radius: 3px;
            animation: progress 3s ease-in-out forwards;
        }
        
        /* Animation for the dots */
        .loading-dots {
            display: inline-flex;
        }
        
        .loading-dots span {
            width: 8px;
            height: 8px;
            margin: 0 3px;
            background-color: white;
            border-radius: 50%;
            opacity: 0;
            animation: fade 1.5s infinite;
        }
        
        .loading-dots span:nth-child(2) {
            animation-delay: 0.5s;
        }
        
        .loading-dots span:nth-child(3) {
            animation-delay: 1s;
        }
        
        @keyframes fade {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }
        
        /* Background pattern */
        .bg-pattern {
            background-image: radial-gradient(#2563EB 1px, transparent 1px);
            background-size: 20px 20px;
            opacity: 0.1;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
        }
        
        /* Counter animation */
        @keyframes countup {
            from { content: "0%"; }
            to { content: "80%"; }
        }
        
        .countdown-value {
            position: relative;
        }
        
        .countdown-value::after {
            content: "0%";
            animation: countup 3s forwards ease-out;
        }
        
        /* Social icons */
        .social-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.2s ease;
        }
        
        .social-icon:hover {
            background-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
        
        /* Email input */
        .email-input {
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 0.625rem 0.75rem;
            border-radius: 0.375rem;
            font-size: 0.875rem;
            transition: all 0.2s ease;
            width: 100%;
        }
        
        .email-input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.5);
            background-color: rgba(255, 255, 255, 0.15);
        }
        
        .email-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
    </style>
</head>
<body class="hero-gradient flex flex-col">
    <!-- Background Pattern -->
    <div class="bg-pattern"></div>
    
    <!-- Content Container -->
    <div class="container mx-auto px-4 py-8 md:py-12 relative z-10 flex-grow flex flex-col justify-center">
        <div class="max-w-3xl mx-auto text-center">
            <!-- Logo -->
            <div class="inline-flex items-center mb-6">
                <div class="text-3xl md:text-4xl font-bold text-white tracking-tight">intrix</div>
                <div class="ml-2 bg-white bg-opacity-20 text-white text-xs px-2 py-1 rounded-full font-medium">BETA</div>
            </div>
            
            <!-- Main Content -->
            <h1 class="text-3xl md:text-5xl font-bold text-white mb-6">곧 만나실 수 있습니다</h1>
            <p class="text-xl text-blue-100 mb-8">감정 분석 기반 마케팅 전략 설계 시스템 Intrix가 준비 중입니다.<br>곧 혁신적인 서비스로 여러분을 찾아뵙겠습니다.</p>
            
            <!-- Progress Bar -->
            <div class="mb-4">
                <div class="progress-bar mb-2">
                    <div class="progress-value"></div>
                </div>
                <div class="flex justify-between text-sm text-blue-100">
                    <span>개발 진행 중</span>
                    <span class="countdown-value"></span>
                </div>
            </div>
            
            <!-- Countdown Section -->
            <div class="bg-white bg-opacity-10 rounded-lg p-6 mb-8">
                <h2 class="text-xl font-semibold text-white mb-4">서비스 출시까지</h2>
                <div class="grid grid-cols-4 gap-2">
                    <div class="bg-white bg-opacity-10 rounded-lg p-4">
                        <div class="text-3xl font-bold text-white" id="days">00</div>
                        <div class="text-xs text-blue-100">일</div>
                    </div>
                    <div class="bg-white bg-opacity-10 rounded-lg p-4">
                        <div class="text-3xl font-bold text-white" id="hours">00</div>
                        <div class="text-xs text-blue-100">시간</div>
                    </div>
                    <div class="bg-white bg-opacity-10 rounded-lg p-4">
                        <div class="text-3xl font-bold text-white" id="minutes">00</div>
                        <div class="text-xs text-blue-100">분</div>
                    </div>
                    <div class="bg-white bg-opacity-10 rounded-lg p-4">
                        <div class="text-3xl font-bold text-white" id="seconds">00</div>
                        <div class="text-xs text-blue-100">초</div>
                    </div>
                </div>
            </div>
            
            <!-- Notification Form -->
            <div class="max-w-lg mx-auto mb-12">
                <h3 class="text-lg font-medium text-white mb-4">서비스 출시 소식을 가장 먼저 받아보세요</h3>
                <form class="flex flex-col sm:flex-row gap-3">
                    <input type="email" placeholder="your@email.com" class="email-input flex-grow" required>
                    <button type="submit" class="btn-primary bg-white text-blue-600 hover:bg-blue-50 whitespace-nowrap">알림 신청하기</button>
                </form>
                <p class="text-sm text-blue-100 mt-2">* 스팸 메일은 발송하지 않으며, 언제든지 구독을 취소할 수 있습니다.</p>
            </div>
            
            <!-- Contact Info -->
            <div class="flex flex-col md:flex-row items-center justify-center space-y-4 md:space-y-0 md:space-x-8">
                <a href="mailto:info@intrix.ai" class="text-blue-100 hover:text-white transition">
                    <i class="far fa-envelope mr-2"></i>
                    info@intrix.ai
                </a>
                <a href="tel:02-1234-5678" class="text-blue-100 hover:text-white transition">
                    <i class="far fa-phone mr-2"></i>
                    02-1234-5678
                </a>
                <div class="flex space-x-3">
                    <a href="#" class="social-icon">
                        <i class="fab fa-twitter"></i>
                    </a>
                    <a href="#" class="social-icon">
                        <i class="fab fa-linkedin-in"></i>
                    </a>
                    <a href="#" class="social-icon">
                        <i class="fab fa-instagram"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Footer -->
    <footer class="bg-blue-800 py-4 relative z-10">
        <div class="container mx-auto px-4">
            <div class="flex flex-col md:flex-row justify-between items-center">
                <div class="text-sm text-blue-100 mb-4 md:mb-0">
                    &copy; 2025 Intrix. All rights reserved.
                </div>
                <div class="flex space-x-6">
                    <a href="#" class="text-sm text-blue-100 hover:text-white">개인정보처리방침</a>
                    <a href="#" class="text-sm text-blue-100 hover:text-white">이용약관</a>
                    <a href="#" class="text-sm text-blue-100 hover:text-white">문의하기</a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        // Countdown Timer
        const countdownDate = new Date();
        countdownDate.setDate(countdownDate.getDate() + 30); // Set to 30 days from now
        
        function updateCountdown() {
            const now = new Date().getTime();
            const distance = countdownDate - now;
            
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);
            
            document.getElementById("days").innerHTML = days.toString().padStart(2, '0');
            document.getElementById("hours").innerHTML = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerHTML = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerHTML = seconds.toString().padStart(2, '0');
            
            if (distance < 0) {
                clearInterval(x);
                document.getElementById("days").innerHTML = "00";
                document.getElementById("hours").innerHTML = "00";
                document.getElementById("minutes").innerHTML = "00";
                document.getElementById("seconds").innerHTML = "00";
            }
        }
        
        // Initial call
        updateCountdown();
        
        // Update every second
        const x = setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
